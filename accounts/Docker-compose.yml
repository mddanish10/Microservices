services:
  accounts:
    image: mddanish5/accounts:s1
    container_name: accounts-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: "700m"
    networks:
      - easybank
  loans:
    image: mddanish5/loans:s1
    container_name: loans-ms
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: "700m"
    networks:
      - easybank
  cards:
    image: mddanish5/cards:s1
    container_name: cards-ms
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: "700m"
    networks:
      - easybank
networks:
  easybank:
    driver: "bridge"

